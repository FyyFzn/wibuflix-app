name: Wibuflix CI/CD Pipeline

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      action_type:
        description: 'Pilih aksi deployment'
        required: true
        default: 'update'
        type: choice
        options:
          - update (OTA - Kirim update kode langsung ke HP pengguna)
          - build-preview (Buat file APK Android untuk testing)
          - build-production (Buat file AAB Android untuk Play Store)

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: ./package-lock.json

      - name: Setup Expo & EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install Dependencies
        run: npm ci

      - name: Validate TypeScript Syntax (CI Check)
        run: npx tsc --noEmit

      - name: Deploy OTA Update (Android Preview)
        if: github.event_name == 'push' || startsWith(github.event.inputs.action_type, 'update')
        run: |
          echo "🚀 Mengirimkan Over-The-Air (OTA) Update ke branch preview (Android)..."
          eas update --branch preview --platform android --non-interactive --message "${{ github.event.head_commit.message || 'Automated CI Update' }}"

      - name: Build Android APK (Preview)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.action_type == 'build-preview'
        run: |
          echo "📦 Membangun APK Android di server cloud EAS..."
          eas build --platform android --profile preview --non-interactive

      - name: Build Android AAB (Production)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.action_type == 'build-production'
        run: |
          echo "🏢 Membangun App Bundle (AAB) Production di server cloud EAS..."
          eas build --platform android --profile production --non-interactive
